version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: pageindex-rag:local
    container_name: pageindex-rag

    # Map host port 8000 → container port 8080.
    # Change the left side (host) freely; don't change 8080 (container).
    ports:
      - "8000:8080"

    # All secrets come from .env — never hard-coded here.
    # Copy .env.example to .env and fill in your keys before running.
    env_file:
      - .env
    environment:
      # Override PORT if you change the container port mapping above.
      - PORT=8080
      # Set to "false" if you don't have a LangSmith key
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}

    # Named volumes — data survives container restarts and image rebuilds.
    # pageindex_cache : uploaded PDFs + pickle document cache
    # pageindex_data  : SQLite checkpoint database (LangGraph session state)
    volumes:
      - pageindex_cache:/app/.cache
      - pageindex_data:/app/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/documents"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  pageindex_cache:
    driver: local
  pageindex_data:
    driver: local
