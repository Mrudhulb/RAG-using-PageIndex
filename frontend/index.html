<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PageIndex RAG Chat</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <!-- ===================== SIDEBAR ===================== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="app-icon">&#128218;</span>
      <h1 class="app-title">PageIndex<br><span>RAG Chat</span></h1>
    </div>

    <!-- Upload -->
    <div class="sidebar-section">
      <button class="btn-upload" id="btnUpload" onclick="document.getElementById('fileInput').click()">
        &#8593; Upload PDF
      </button>
      <input type="file" id="fileInput" accept=".pdf" style="display:none" />
      <div id="uploadStatus" class="upload-status"></div>
    </div>

    <!-- Model selector -->
    <div class="sidebar-section">
      <label class="section-label">Model</label>
      <select id="modelSelector" class="model-select">
        <option value="openai/gpt-oss-20b:free">GPT-OSS 20B (free) ✓</option>
        <option value="openai/gpt-oss-120b:free">GPT-OSS 120B (free)</option>
        <option value="meta-llama/llama-3.3-70b-instruct:free">Llama 3.3 70B (free)</option>
        <option value="meta-llama/llama-3.2-3b-instruct:free">Llama 3.2 3B (free)</option>
        <option value="google/gemma-3-27b-it:free">Gemma 3 27B (free)</option>
        <option value="google/gemma-3-12b-it:free">Gemma 3 12B (free)</option>
        <option value="nousresearch/hermes-3-llama-3.1-405b:free">Hermes 3 405B (free)</option>
        <option value="nvidia/nemotron-3-super-120b-a12b:free">Nemotron Super 120B (free)</option>
      </select>
    </div>

    <!-- Documents list -->
    <div class="sidebar-section docs-section">
      <label class="section-label">Documents</label>
      <ul class="doc-list" id="docList">
        <li class="doc-empty">No documents loaded.</li>
      </ul>
    </div>

    <!-- Clear chat -->
    <div class="sidebar-footer">
      <button class="btn-clear" id="btnClear" onclick="clearChat()">
        &#10006; Clear Chat
      </button>
    </div>
  </aside>

  <!-- ===================== MAIN CHAT AREA ===================== -->
  <main class="chat-main">
    <!-- Active doc banner -->
    <div class="active-doc-bar" id="activeDocBar" style="display:none">
      <span id="activeDocName"></span>
      <button class="deselect-btn" onclick="deselectDoc()">&#10006; Deselect</button>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="welcome-msg">
        <h2>Welcome to PageIndex RAG Chat</h2>
        <p>Upload a PDF in the sidebar and start asking questions, or chat freely without a document.</p>
      </div>
    </div>

    <!-- Typing indicator -->
    <div class="typing-indicator" id="typingIndicator" style="display:none">
      <span></span><span></span><span></span>
    </div>

    <!-- Input bar -->
    <div class="input-bar">
      <textarea
        id="queryInput"
        class="query-input"
        placeholder="Ask anything…"
        rows="1"
        onkeydown="handleKey(event)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        &#9658;
      </button>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
